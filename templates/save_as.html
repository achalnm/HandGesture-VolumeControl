<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save CSV</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 580px; margin: 60px auto; padding: 0 24px; color: #222; }
        h1  { font-size: 1.4rem; margin-bottom: 0.25rem; }
        p   { color: #555; margin-top: 0.25rem; }
        .success { color: #2a7a2a; font-weight: bold; }
        label { display: block; margin-top: 1.4rem; font-weight: bold; }
        input[type=text] { display: block; width: 100%; margin-top: 0.4rem; padding: 0.4rem;
                           box-sizing: border-box; font-size: 0.95rem; }
        .note { font-size: 0.82rem; color: #777; margin-top: 0.35rem; }
        button {
            margin-top: 2rem; padding: 0.6rem 1.6rem;
            background: #1a1a1a; color: #fff; border: none;
            border-radius: 4px; cursor: pointer; font-size: 0.95rem;
        }
        button:hover { background: #444; }
    </style>
</head>
<body>
    <h1>Images Uploaded</h1>
    <p class="success">Saved to <strong>{{ folder1 }}/</strong> and <strong>{{ folder2 }}/</strong>.</p>
    <p>Enter a name for the CSV label file and click Generate to download it.</p>

    <form action="/download" method="POST">
        <label for="filename">CSV filename <span style="font-weight:normal">(no extension)</span>:</label>
        <input type="text" id="filename" name="filename" value="labels" required>
        <p class="note">The file will be saved to the project's <code>data/</code> folder and downloaded automatically.</p>

        <button type="submit">Generate &amp; Download CSV</button>
    </form>
</body>
</html>
